<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>3RsTV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<!-- iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<div class="lp-header">
  <div class="logo">3RsTV IPTV</div>

  <div class="viewer-fisheye">
    <div class="viewer-fisheye-inner">
      <div id="viewerCount" class="viewer-count">1</div>
      <div class="viewer-label">ONLINE</div>
    </div>
  </div>
</div>

<div class="lp-container">

  <!-- PLAYER LEFT -->
  <div class="lp-left">
    <div class="player-wrapper">
      <div id="playerContainer"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="lp-right">

    <!-- SLIDER -->
    <div class="lp-slider">
      <img id="bannerImg" src="https://i.imgur.com/Y9gGFen.jpeg">
    </div>

    <!-- TOP VIEWED -->
    <div class="lp-section">
      <h3>Top 10 Viewed Channels</h3>
      <div id="top10List" class="lp-top10"></div>
    </div>

    <!-- CATEGORIES -->
    <div class="lp-section">
      <h3>Categories</h3>

      <div id="categoryTabs" class="lp-categories">
        <button class="category-tab active" data-category="HLS">HLS</button>
        <button class="category-tab" data-category="Converge">Converge</button>
        <button class="category-tab" data-category="Cignal">Cignal</button>
        <button class="category-tab" data-category="Radio">Radio</button>
        <button class="category-tab" data-category="NowShowing">Now Showing</button>
        <button class="category-tab" data-category="Favorites">Favorites</button>
      </div>
    </div>

    <!-- CHANNEL LIST -->
    <div class="lp-section">
      <h3 id="catTitle">HLS Channels</h3>
      <div id="channelList" class="lp-channels"></div>
    </div>

  </div>
</div>

<!-- PLAYERS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.2/shaka-player.compiled.min.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="channels.js"></script>
<script src="app.js"></script>

<!-- HERO SLIDER -->
<script>
const banners=[
"https://i.imgur.com/Y9gGFen.jpeg",
"https://i.imgur.com/HLJtTBw.jpeg",
"https://i.imgur.com/qeA9Q5q.png",
"https://i.imgur.com/b4rjf8n.png"
];

let bannerIndex=0;
setInterval(()=>{
  bannerIndex++;
  if(bannerIndex>=banners.length) bannerIndex=0;
  bannerImg.src=banners[bannerIndex];
},4000);
</script>

<!-- TOP 10 REALTIME -->
<script>
let top10Timer=null;

async function renderTopViewed(){
  if(!window.supabase) return;

  const sb = window.supabase.createClient(
    "https://uhujowmgmcnjbkgacfke.supabase.co",
    "sb_publishable_fZBycaepGYVBzl3k3wszMQ_iY4klXV2"
  );

  const { data } = await sb
    .from("channel_views")
    .select("*")
    .order("views",{ascending:false})
    .limit(10);

  const list=document.getElementById("top10List");
  if(!list) return;
  list.innerHTML="";

  data?.forEach((row,i)=>{
    const ch=window.CHANNELS_DATA.find(c=>c.id===row.id);
    if(!ch) return;

    const div=document.createElement("div");
    div.className="top10-card";
    div.innerHTML=`
      <div class="rank">${i+1}</div>
      <img src="${row.logo}">
    `;
    div.onclick=()=>playChannel(ch);
    list.appendChild(div);
  });
}

function startTop10Refresh(){
  renderTopViewed();
  if(top10Timer) clearInterval(top10Timer);
  top10Timer=setInterval(renderTopViewed,10000);
}

setTimeout(startTop10Refresh,2000);
</script>

<!-- SAFE SERVICE WORKER REGISTER -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").then(reg => {

      reg.update();

      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "activated") {
            window.location.reload();
          }
        });
      });

    });
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/disable-devtool"></script>
<script>DisableDevtool({});</script>

</body>
</html>
